services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hh_finance
      POSTGRES_USER: hh
      POSTGRES_PASSWORD: hh_secret_change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hh -d hh_finance"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hh_finance
      SPRING_DATASOURCE_USERNAME: hh
      SPRING_DATASOURCE_PASSWORD: hh_secret_change_me
      HH_JWT_SECRET: "${HH_JWT_SECRET:-dev-only-change-this-secret-min-32-chars-long!!}"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8090
    depends_on:
      - api

volumes:
  pgdata:
