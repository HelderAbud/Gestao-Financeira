name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Test & package API
        run: mvn -B -f apps/api test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Regenerate types from OpenAPI snapshot
        run: npm run generate:types:snapshot

      - name: Test web (Vitest)
        run: npm run test:web

      - name: Build web app
        run: npm run build -w @hh/web

      - name: Check types drift (optional guard)
        run: git diff --exit-code packages/types/src/api.d.ts || (echo "Commit api.d.ts after changing openapi.snapshot.json or run npm run generate:types:snapshot" && exit 1)
