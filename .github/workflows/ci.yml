name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          cache-dependency-path: hh-financeiro-v6/apps/api/pom.xml

      - name: Test & package API
        run: mvn -B -f hh-financeiro-v6/apps/api test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hh-financeiro-v6/package-lock.json

      - name: Install JS dependencies
        working-directory: hh-financeiro-v6
        run: npm ci

      - name: Regenerate types from OpenAPI snapshot
        working-directory: hh-financeiro-v6
        run: npm run generate:types:snapshot

      - name: Test web (Vitest)
        working-directory: hh-financeiro-v6
        run: npm run test:web

      - name: Build web app
        working-directory: hh-financeiro-v6
        run: npm run build -w @hh/web

      - name: Check types drift
        run: git diff --exit-code hh-financeiro-v6/packages/types/src/api.d.ts || (echo "Regenerate api.d.ts in hh-financeiro-v6" && exit 1)
