name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolver raiz do monorepo (repositório só com v6 na raiz vs. pasta hh-financeiro-v6)
        id: mono
        run: |
          if [ -f hh-financeiro-v6/package.json ]; then echo "root=hh-financeiro-v6" >> $GITHUB_OUTPUT
          else echo "root=." >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          cache-dependency-path: ${{ steps.mono.outputs.root }}/apps/api/pom.xml

      - name: Test API (Maven)
        working-directory: ${{ steps.mono.outputs.root }}
        run: mvn -B -f apps/api test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ steps.mono.outputs.root }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ steps.mono.outputs.root }}
        run: npm ci

      - name: Regenerar tipos (snapshot) e verificar drift em api.d.ts
        working-directory: ${{ steps.mono.outputs.root }}
        run: npm run generate:types:snapshot && git diff --exit-code packages/types/src/api.d.ts

      - name: Test web (Vitest)
        working-directory: ${{ steps.mono.outputs.root }}
        run: npm run test:web

      - name: Build Next.js
        working-directory: ${{ steps.mono.outputs.root }}
        run: npm run build -w @hh/web
